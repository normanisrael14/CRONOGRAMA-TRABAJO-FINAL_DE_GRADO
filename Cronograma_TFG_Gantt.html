<meta charset="UTF-8">
<title>Cronograma TFG - Diagrama de Gantt</title>

<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --accent: #5b8cff;
    --accent2: #ff8a5b;
    --text: #e7e9ee;
    --muted: #9aa3b2;
    --phase: #3a4257;
    --milestone: #ff8a5b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid #232735;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  h1 { margin: 0 0 4px; font-size: 1.3rem; font-weight: 600; }
  .sub { color: var(--muted); font-size: 0.85rem; }
  .controls {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .controls button {
    background: var(--panel);
    border: 1px solid #2a2f3d;
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: 0.15s;
  }
  .controls button:hover, .controls button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .legend {
    display: flex;
    gap: 16px;
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--muted);
    align-items: center;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  #gantt-wrap {
    overflow: auto;
    padding: 16px 0 60px;
  }
  #gantt { min-width: 100%; }

  /* Frappe Gantt overrides */
  .gantt .grid-background { fill: var(--bg); }
  .gantt .grid-header { fill: var(--panel); stroke: #232735; }
  .gantt .grid-row { fill: var(--bg); }
  .gantt .grid-row:nth-child(even) { fill: #131620; }
  .gantt .row-line { stroke: #1d2130; }
  .gantt .tick { stroke: #232735; }
  .gantt .tick.thick { stroke: #323849; }
  .gantt .today-highlight { fill: rgba(91,140,255,0.15); }
  .gantt-container .lower-text, .gantt-container .upper-text { fill: var(--muted); font-size: 10px; }
  .gantt .bar { fill: var(--accent); stroke: none; rx: 4; ry: 4; }
  .gantt .bar-progress { fill: #3f6fe0; }
  .gantt .bar-label { fill: #fff; font-size: 11px; }
  .gantt .bar-label.big { fill: var(--text); }
  .gantt .bar-wrapper.phase .bar { fill: var(--phase); }
  .gantt .bar-wrapper.phase .bar-progress { fill: var(--phase); }
  .gantt .bar-wrapper.milestone .bar { fill: var(--milestone); }
  .gantt .arrow { stroke: #4a5268; }
  .gantt-container { background: var(--bg); }
  .popup-wrapper { background: var(--panel); border: 1px solid #2a2f3d; color: var(--text); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .popup-wrapper .title { color: var(--text); font-weight: 600; }
  .popup-wrapper .subtitle { color: var(--muted); }
  .popup-wrapper .pointer { display:none; }
</style>
</head>

<header>

    <button data-mode="Month">Mes</button>
    <div class="legend">
      <span><span class="dot" style="background:var(--phase)"></span>Fase</span>
      <span><span class="dot" style="background:var(--accent)"></span>Tarea</span>
      <span><span class="dot" style="background:var(--milestone)"></span>Hito</span>
    </div>
  </div>
</header>
<div id="gantt-wrap">
  <svg id="gantt"></svg>
</div>
